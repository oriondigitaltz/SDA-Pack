name: sifahymns
description: "SDA Pack - Bible, hymns, daily devotions, and the 28 Fundamental Beliefs, fully offline."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  share_plus: ^10.1.4
  path: ^1.9.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0
  scrollable_positioned_list: ^0.3.8
  http: ^1.2.2
  flutter_widget_from_html_core: ^0.15.2
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/hymnals/en/
    - assets/hymnals/sw/
    - assets/branding/
    - assets/bible/
    - assets/devotions/
    - assets/beliefs/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/logo.png"
  min_sdk_android: 26
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/logo.png"
